  <script>
    (function () {
      try {
        var t = localStorage.getItem('app_theme');
        var mapped = t;
        if (t === 'light') mapped = 'minimal-light';
        else if (t === 'dark' || t === 'system') mapped = 'dark-premium';
        if (!mapped) mapped = 'dark-premium';
        document.documentElement.setAttribute('data-theme', mapped);
        document.documentElement.classList.add('theme-' + mapped);
        if (mapped === 'minimal-light') document.documentElement.classList.add('theme-light');
        if (mapped === 'minimal-light') {
          document.body.style.background = '#f8fafc';
          document.body.style.color = '#0f172a';
        } else if (mapped === 'glassmorphism') {
          document.body.style.background =
            'radial-gradient(circle at top left, #312e81 0%, #0f172a 45%, #111827 100%)';
          document.body.style.color = '#e2e8f0';
        } else if (mapped === 'corporate-blue') {
          document.body.style.background = '#102a43';
          document.body.style.color = '#e6f1ff';
        } else if (mapped === 'colorful-dashboard') {
          document.body.style.background =
            'linear-gradient(145deg, #1f1147 0%, #311b92 35%, #0f172a 100%)';
          document.body.style.color = '#f8fafc';
        } else {
          document.body.style.background = '#0b1220';
          document.body.style.color = '#f8fafc';
        }
        var fs = localStorage.getItem('app_font_scale');
        if (fs === 'sm') document.documentElement.style.fontSize = '87.5%';
        else if (fs === 'lg') document.documentElement.style.fontSize = '112.5%';
        else if (fs === 'xl') document.documentElement.style.fontSize = '125%';
        if (localStorage.getItem('app_reduced_motion') === '1')
          document.documentElement.classList.add('reduce-motion');
      } catch (e) {}
    })();
  </script>
